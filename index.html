<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Luxury</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        /* --- ENCABEZADO Y LOGO --- */
        .header-dark {
            background-color: #1a1a1a; /* Fondo oscuro para que se vea el texto blanco del logo */
            color: white;
            text-align: center;
            padding: 20px;
        }
        .logo-luxury {
            max-width: 250px; /* Ajusta este tamaño a tu gusto */
            height: auto;
            object-fit: contain;
            margin-bottom: 10px;
        }

        /* --- RELOJ Y FECHA --- */
        .contenedor-reloj-fecha {
            margin-top: 10px;
            font-size: 1.2em;
        }
        #fecha {
            font-size: 0.8em;
            color: #ccc;
            margin-top: 5px;
        }

        /* --- BARRA DE BOTONES FIJA --- */
        .barra-fija {
            display: flex;
            justify-content: space-around;
            background-color: #333;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .barra-fija button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #d4af37; /* Dorado similar a la cinta de tu logo */
            color: #1a1a1a;
            font-weight: bold;
        }
        .barra-fija button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }

        /* --- CONTENEDOR DE PANTALLAS --- */
        .contenedor-pantalla {
            padding: 20px;
        }
        .pantalla {
            display: none;
        }
        .pantalla.activa {
            display: block;
        }

        /* --- CARDS DE EJEMPLO --- */
        .card {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border: 2px solid transparent;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: border-color 0.3s;
        }
        .card.seleccionada {
            border-color: #d4af37; /* Borde dorado al seleccionar */
            background-color: #fdfbf5;
        }

        /* --- ANIMACIÓN PARPADEO LENTO (5 veces en 5 segundos) --- */
        @keyframes titilarLento {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .parpadeo-lento {
            /* 1 segundo de duración x 5 repeticiones = 5 segundos exactos */
            animation: titilarLento 1s linear 5; 
        }
    </style>
</head>
<body>

    <div class="header-dark">
        <img src="logo_original-removebg-preview.png" alt="Luxury Logo" class="logo-luxury">
        <h1 id="titulo-pantalla">PEDIDOS</h1>
        <div class="contenedor-reloj-fecha">
            <div id="hora">00:00:00</div>
            <div id="fecha">--/--/--</div>
        </div>
    </div>

    <div id="barra-botones" class="barra-fija">
        <button id="btn-crear-tareas" disabled>CREAR TAREAS</button> 
        <button id="btn-imprimir">IMPRIMIR TAREAS</button>
        <button id="btn-navegacion">IR A TAREAS</button>
    </div>

    <div class="contenedor-pantalla">
        
        <div id="pantalla-pedidos" class="pantalla activa">
            <div class="card" onclick="seleccionarCard(this)">Pedido #1 (Haz clic para seleccionar)</div>
            <div class="card" onclick="seleccionarCard(this)">Pedido #2 (Haz clic para seleccionar)</div>
            <div class="card" onclick="seleccionarCard(this)">Pedido #3 (Haz clic para seleccionar)</div>
        </div>

        <div id="pantalla-tareas" class="pantalla">
            <p>Aquí se verá el listado de las tareas que creaste.</p>
        </div>

    </div>

    <script>
        // 1. Lógica del Reloj y la Fecha
        function actualizarRelojYFecha() {
            const ahora = new Date();
            
            // Hora
            const horas = String(ahora.getHours()).padStart(2, '0');
            const minutos = String(ahora.getMinutes()).padStart(2, '0');
            const segundos = String(ahora.getSeconds()).padStart(2, '0');
            document.getElementById('hora').textContent = `${horas}:${minutos}:${segundos}`;

            // Fecha en formato DD/MM/YY
            const dia = String(ahora.getDate()).padStart(2, '0');
            const mes = String(ahora.getMonth() + 1).padStart(2, '0');
            const anio = String(ahora.getFullYear()).slice(-2);
            document.getElementById('fecha').textContent = `${dia}/${mes}/${anio}`;
        }
        setInterval(actualizarRelojYFecha, 1000);
        actualizarRelojYFecha();

        // 2. Lógica de Navegación (Cambio de títulos y botón)
        const btnNavegacion = document.getElementById('btn-navegacion');
        const tituloPantalla = document.getElementById('titulo-pantalla');
        const pantallaPedidos = document.getElementById('pantalla-pedidos');
        const pantallaTareas = document.getElementById('pantalla-tareas');
        let enPantallaPedidos = true;

        btnNavegacion.addEventListener('click', () => {
            enPantallaPedidos = !enPantallaPedidos;
            
            if (enPantallaPedidos) {
                tituloPantalla.textContent = "PEDIDOS";
                btnNavegacion.textContent = "IR A TAREAS";
                pantallaPedidos.classList.add('activa');
                pantallaTareas.classList.remove('activa');
            } else {
                tituloPantalla.textContent = "TAREAS";
                btnNavegacion.textContent = "IR A PEDIDOS";
                pantallaTareas.classList.add('activa');
                pantallaPedidos.classList.remove('activa');
            }
        });

        // 3. Lógica de selección de Cards para habilitar "Crear Tareas"
        const btnCrearTareas = document.getElementById('btn-crear-tareas');
        let tarjetasSeleccionadas = 0;

        function seleccionarCard(elemento) {
            elemento.classList.toggle('seleccionada');
            
            if (elemento.classList.contains('seleccionada')) {
                tarjetasSeleccionadas++;
            } else {
                tarjetasSeleccionadas--;
            }

            // Habilitar o deshabilitar botón fijo
            btnCrearTareas.disabled = tarjetasSeleccionadas === 0;
        }

        // 4. Lógica del parpadeo lento
        // Asignamos la animación a algún elemento para probarla, por ejemplo al crear tareas
        btnCrearTareas.addEventListener('click', () => {
            tituloPantalla.classList.remove('parpadeo-lento');
            void tituloPantalla.offsetWidth; // Esto fuerza al navegador a reiniciar la animación
            tituloPantalla.classList.add('parpadeo-lento');
            
            console.log("Animación de 5 segundos iniciada.");
        });

        // Evento temporal para Imprimir Tareas (lo haremos en el siguiente paso)
        document.getElementById('btn-imprimir').addEventListener('click', () => {
            alert("En el próximo paso configuraremos la generación del PDF.");
        });

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos Live</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #060a12;
    font-family: 'Share Tech Mono', monospace;
    color: #c8e8ff;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, #0ff1 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none; z-index: 0;
  }
  .container {
    position: relative; z-index: 2;
    padding: 16px 12px 24px;
    max-width: 480px; margin: 0 auto;
  }
  
  /* --- HEADER & TITLES --- */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid #0ff2;
  }
  .logo-img {
    height: 56px; width: auto; display: block;
    object-fit: contain;
    border-radius: 4px;
    filter: drop-shadow(0 0 4px rgba(255,255,255,0.1));
  }
  .header-info {
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  }
  .live-badge {
    display: flex; align-items: center; gap: 7px;
    font-size: 11px; color: #0f0; letter-spacing: 0.15em; font-weight: bold;
  }
  .live-dot {
    width: 9px; height: 9px; border-radius: 50%; background: #0f0;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%   { opacity: 1; box-shadow: 0 0 0 0 #0f08; }
    45%  { opacity: 1; box-shadow: 0 0 0 6px #0f000; }
    50%  { opacity: 0; box-shadow: 0 0 0 0 #0f000; }
    55%  { opacity: 0; }
    100% { opacity: 1; box-shadow: 0 0 0 0 #0f08; }
  }
  .clock { font-size: 13px; color: #7ecfff; letter-spacing: 0.12em; margin-top: 2px;}
  .date { font-size: 11px; color: #5588aa; letter-spacing: 0.15em; }
  
  /* --- BARRA DE BOTONES FIJA --- */
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #060a12;
    padding-top: 10px;
    margin-bottom: 15px;
  }
  .page-title {
    font-size: 18px;
    color: #00ffff;
    letter-spacing: 0.15em;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .button-bar {
    display: flex;
    border: 2px solid #ffe600;
    background: #0a0f1c;
  }
  .button-bar button {
    flex: 1;
    background: transparent;
    color: #ffe600;
    border: none;
    border-right: 2px solid #ffe600;
    font-family: 'Share Tech Mono', monospace;
    font-weight: bold;
    font-size: 11px;
    padding: 10px 2px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .button-bar button:last-child {
    border-right: none;
  }
  .button-bar button:disabled {
    color: #556677;
    background: #060a12;
    border-right: 2px solid #556677;
    cursor: not-allowed;
  }
  .button-bar button:disabled:last-child {
    border-right: none;
  }

  /* Pantallas */
  .view { display: none; }
  .view.active { display: block; }

  .card {
    background: #0a0f1c; border: 1px solid #0ff2;
    border-radius: 4px; margin-bottom: 10px;
    position: relative; overflow: visible;
    animation: fadeIn 0.4s ease both;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
  }
  
  /* Estados */
  .card.PENDIENTE::before  { background: #ff3344; }
  .card.EN-PROCESO::before { background: #ff9500; }
  .card.TERMINADO::before  { background: #ffe600; }
  .card.DESPACHADO::before { background: #00cfff; }
  .card.RECIBIDO::before   { background: #00e64d; }
  
  .card.PENDIENTE { cursor: pointer; }
  .card.PENDIENTE.selected {
    border-color: #00ffff;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.25);
  }

  .c { position: absolute; width: 8px; height: 8px; }
  .tl { top:0;left:0; border-top:1px solid #0ff5; border-left:1px solid #0ff5; }
  .tr { top:0;right:0; border-top:1px solid #0ff5; border-right:1px solid #0ff5; }
  .bl { bottom:0;left:0; border-bottom:1px solid #0ff5; border-left:1px solid #0ff5; }
  .br { bottom:0;right:0; border-bottom:1px solid #0ff5; border-right:1px solid #0ff5; }
  .card-inner { padding: 12px 14px 12px 17px; }
  .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .card-product { font-size:13px; color:#d8f0ff; letter-spacing:0.04em; line-height:1.3; flex:1; min-width:0; }
  .card-qty {
    font-size:11px; color:#0ff; letter-spacing:0.08em;
    background:#0ff1; border:1px solid #0ff3;
    padding:3px 9px; border-radius:2px; flex-shrink:0; white-space:nowrap;
  }
  .card-client { font-size:12px; color:#5588aa; margin-top:4px; letter-spacing:0.05em; }
  .card-mid { display:flex; align-items:center; margin-top:12px; gap:12px; }
  .bar-wrap { flex:1; min-width:0; }
  .bar-track { height:6px; background:#111c2a; border-radius:2px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:2px; animation: barGrow 1s cubic-bezier(.4,0,.2,1) both; }
  @keyframes barGrow { from { width: 0 !important; } }
  .bar-state-row {
    position: relative;
    height: 26px;
    margin-top: 6px;
    overflow: visible;
  }
  .estado-tag {
    position: absolute;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.10em;
    padding: 3px 7px;
    border-radius: 2px;
    border: 1px solid;
    white-space: nowrap;
    top: 0;
    transform: translateX(-100%);
    line-height: 1.5;
    font-family: 'Share Tech Mono', monospace;
  }
  .demora-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 50px;
    gap: 0;
  }
  .demora-num { font-size: 26px; line-height: 1; font-weight: bold; }
  .demora-unit { font-size: 9px; color: #446688; letter-spacing: 0.1em; }
  
  .btn-informar {
    background: #556677;
    color: #fff;
    border: none;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    font-weight: bold;
    padding: 6px 12px;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.1s ease;
  }
  
  .card.titilar-terminado {
    animation: titilarLento 1s linear 5;
    border-color: #ffe600 !important;
    box-shadow: 0 0 15px rgba(255,230,0,0.5) !important;
  }
  .card.titilar-terminado::before {
    background: #ffe600 !important;
  }
  @keyframes titilarLento {
    0%, 100% { opacity: 1; background: #0a0f1c; }
    50% { opacity: 0.3; background: rgba(255,230,0,0.15); }
  }

  .loading {
    text-align:center; color:#0ff6; font-size:13px;
    letter-spacing:0.15em; padding:40px 0;
    animation: blink2 1s infinite;
  }
  @keyframes blink2 { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .error { text-align:center; color:#ff3344; font-size:12px; padding:30px 12px; letter-spacing:0.08em; line-height:1.8; }
  
  /* Footer ocultable */
  .footer {
    text-align:center; font-size:13px; color:#7ecfff;
    letter-spacing:0.12em; margin-top:10px; display: block;
  }
</style>
</head>
<body>
<div class="container">
  
  <div class="header">
    <img class="logo-img" id="logoImg" src="logo_original-removebg-preview.png" alt="Luxury High Density" />
    <div class="header-info">
      <div class="live-badge"><div class="live-dot"></div>EN VIVO</div>
      <div class="clock" id="clock">--:--:--</div>
      <div class="date" id="date">--/--/--</div>
    </div>
  </div>

  <div class="top-bar">
    <div class="page-title" id="pageTitle">PEDIDOS</div>
    <div class="button-bar">
      <button id="btnCrearTareas" disabled onclick="crearTareasDiarias()">CREAR TAREAS</button>
      <button id="btnImprimir" disabled onclick="imprimirPDF()">IMPRIMIR TAREAS</button>
      <button id="btnNavegar" onclick="togglePantalla()">IR A TAREAS</button>
      <button id="btnActualizar" onclick="cargarTodo()">ACTUALIZAR</button>
    </div>
  </div>

  <div id="viewPedidos" class="view active">
    <div id="cards"><div class="loading">CARGANDO DATOS...</div></div>
  </div>

  <div id="viewTareas" class="view">
    <div id="printContainer" style="width: 100%;">
      
      <div id="printHeader" style="display: none; justify-content: space-between; align-items: center; border-bottom: 2px solid #000000; padding-bottom: 15px; margin-bottom: 20px;">
        <img src="logo_original-removebg-preview.png" style="height: 45px; object-fit: contain; filter: drop-shadow(0 0 4px rgba(255,255,255,0.1));">
        <div style="text-align: right; font-family: 'Share Tech Mono', monospace; color: #000000;">
          <div id="printHeaderTitle" style="font-size: 16px; font-weight: bold; letter-spacing: 0.05em;">LISTA DE TAREAS</div>
          <div id="printHeaderTime" style="font-size: 11px; margin-top: 4px; letter-spacing: 0.1em;">--:--</div>
        </div>
      </div>

      <div id="cardsTareas"></div>

    </div>
  </div>

  <div class="footer" id="footer"></div>
</div>

<script>
const SHEET_ID = '1Zd4OApS21VwEA29jHzbAM0P_Q8T6BOaChgj9q5EhNWo';
let rawPedidos = [];
let productos = {};
let clientes = {};
let seleccionados = new Set();
let enPedidos = true;

function sheetURL(nombre) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(nombre)}&t=${Date.now()}`;
}

async function fetchSheet(nombre) {
  const res = await fetch(sheetURL(nombre));
  const txt = await res.text();
  const json = JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json.table.rows;
}

function parseGoogleDate(v) {
  if (!v) return null;
  if (typeof v === 'string' && v.startsWith('Date(')) {
    const parts = v.replace('Date(','').replace(')','').split(',');
    return new Date(+parts[0], +parts[1], +parts[2]);
  }
  return null;
}

const COLORES = { 'PENDIENTE': '#ff3344', 'EN PROCESO': '#ff9500', 'TERMINADO': '#ffe600', 'DESPACHADO': '#00cfff', 'RECIBIDO': '#00e64d' };
const BAR_PCT = { 'PENDIENTE':28, 'EN PROCESO':50, 'TERMINADO':65, 'DESPACHADO':80, 'RECIBIDO':100 };
const TAG_BG = { 'PENDIENTE': 'rgba(255,51,68,0.12)', 'EN PROCESO': 'rgba(255,149,0,0.12)', 'TERMINADO': 'rgba(255,230,0,0.12)', 'DESPACHADO': 'rgba(0,207,255,0.12)', 'RECIBIDO': 'rgba(0,230,77,0.12)' };

function estadoKey(e) { return (e||'').trim().toUpperCase(); }
function cssKey(e) { return estadoKey(e).replace(/ /g,'-'); }

async function cargarTodo() {
  if (!enPedidos) return;
  document.getElementById('cards').innerHTML = '<div class="loading">CARGANDO DATOS...</div>';
  try {
    const [rowsPedidos, rowsPrecios, rowsClientes] = await Promise.all([ fetchSheet('PEDIDOS'), fetchSheet('PRECIOS DE LISTA'), fetchSheet('CLIENTES') ]);
    rawPedidos = rowsPedidos; seleccionados.clear();
    productos = {}; rowsPrecios.forEach(r => { if(r.c[0]?.v != null) productos[String(r.c[0].v)] = r.c[1]?.v; });
    clientes = {}; rowsClientes.forEach(r => { if(r.c[0]?.v != null) clientes[String(r.c[0].v)] = r.c[1]?.v; });
    renderizarPedidos();
    actualizarBotonTareas();
  } catch(e) { document.getElementById('cards').innerHTML = `<div class="error">// ERROR AL CARGAR DATOS</div>`; }
}

function renderizarPedidos() {
  let html = '';
  rawPedidos.forEach((row, i) => {
    const cols = row.c; const estadoRaw = estadoKey(cols[6]?.v || 'PENDIENTE');
    const nombreProd = productos[String(cols[3]?.v||'')] || cols[3]?.v;
    const isSelected = seleccionados.has(i) ? 'selected' : '';
    html += `<div class="card ${cssKey(estadoRaw)} ${isSelected}" id="card-pedido-${i}" onclick="toggleSeleccion(${i}, '${estadoRaw}')">
      <div class="c tl"></div><div class="c tr"></div><div class="c bl"></div><div class="c br"></div>
      <div class="card-inner">
        <div class="card-top"><div class="card-product">${nombreProd}</div><div class="card-qty">${cols[4]?.v||'—'} ud.</div></div>
        <div class="card-client">&gt; ${clientes[String(cols[2]?.v||'')] || cols[2]?.v||''}</div>
      </div>
    </div>`;
  });
  document.getElementById('cards').innerHTML = html || '<div class="error">// SIN PEDIDOS</div>';
  actualizarFooter(rawPedidos.length);
}

function toggleSeleccion(index, estado) {
  if (estado !== 'PENDIENTE') return;
  const card = document.getElementById(`card-pedido-${index}`);
  seleccionados.has(index) ? seleccionados.delete(index) : seleccionados.add(index);
  card.classList.toggle('selected');
  actualizarBotonTareas();
}

function actualizarBotonTareas() { document.getElementById('btnCrearTareas').disabled = seleccionados.size === 0; }
function actualizarBotonImprimir() { document.getElementById('btnImprimir').disabled = document.querySelectorAll('#cardsTareas .card:not([style*="display: none"])').length === 0; }

function crearTareasDiarias() {
  const container = document.getElementById('cardsTareas');
  container.innerHTML = '';
  seleccionados.forEach(index => {
    const row = rawPedidos[index];
    const div = document.createElement('div');
    div.className = 'card EN-PROCESO';
    div.id = `card-tarea-${index}`;
    div.innerHTML = `<div class="c tl"></div><div class="c tr"></div><div class="c bl"></div><div class="c br"></div>
      <div class="card-inner">
        <div class="card-top"><div class="card-product" style="color:#ffe600">${productos[String(row.c[3]?.v||'')]||row.c[3]?.v}</div><div class="card-qty">${row.c[4]?.v||'—'} ud.</div></div>
        <div style="margin-top:10px;text-align:right"><button class="btn-informar" id="btn-inf-${index}" onclick="informarTerminado(${index})">Informar TERMINADO</button></div>
      </div>`;
    container.appendChild(div);
  });
  if(enPedidos) togglePantalla();
  actualizarBotonImprimir();
}

function informarTerminado(index) {
  const btn = document.getElementById(`btn-inf-${index}`);
  const card = document.getElementById(`card-tarea-${index}`);
  btn.innerText = 'TERMINADO'; btn.style.background = '#ffe600'; btn.style.color = '#060a12';
  card.classList.add('titilar-terminado');
  setTimeout(() => { card.style.display = 'none'; actualizarBotonImprimir(); }, 5000);
}

function togglePantalla() {
  enPedidos = !enPedidos;
  document.getElementById('viewPedidos').classList.toggle('active');
  document.getElementById('viewTareas').classList.toggle('active');
  document.getElementById('pageTitle').innerText = enPedidos ? 'PEDIDOS' : 'TAREAS';
  document.getElementById('btnNavegar').innerText = enPedidos ? 'IR A TAREAS' : 'IR A PEDIDOS';
  document.getElementById('footer').style.display = enPedidos ? 'block' : 'none';
  if(enPedidos) { seleccionados.clear(); cargarTodo(); }
}

function imprimirPDF() {
  const containerTareas = document.getElementById('cardsTareas');
  if(!containerTareas || containerTareas.querySelectorAll('.card:not([style*="display: none"])').length === 0) {
    alert('No hay tareas para imprimir.');
    return;
  }
  
  const printHeader = document.getElementById('printHeader');
  const printTitle = document.getElementById('printHeaderTitle');
  const printTime = document.getElementById('printHeaderTime');
  
  const now = new Date();
  const dia = String(now.getDate()).padStart(2, '0');
  const mes = String(now.getMonth() + 1).padStart(2, '0');
  const anio = String(now.getFullYear()).slice(-2);
  const horas = String(now.getHours()).padStart(2, '0');
  const minutos = String(now.getMinutes()).padStart(2, '0');

  // Aplicamos colores negros para PDF
  printTitle.style.color = '#000000';
  printTitle.innerText = `LISTA DE TAREAS DEL ${dia}/${mes}/${anio}`;
  printTime.style.color = '#000000';
  printTime.innerText = `${horas}:${minutos}`;
  printHeader.style.display = 'flex';
  
  const opt = {
    margin: [10, 10, 15, 10], filename: `tareas_${dia}${mes}${anio}.pdf`,
    html2canvas: { scale: 2, backgroundColor: '#ffffff' },
    jsPDF: { unit: 'mm', format: 'a4' }
  };
  
  html2pdf().set(opt).from(document.getElementById('printContainer')).toPdf().get('pdf').then(pdf => {
    const total = pdf.internal.getNumberOfPages();
    for (let i = 1; i <= total; i++) {
      pdf.setPage(i); pdf.setTextColor(0, 0, 0);
      pdf.text(`HOJA ${i} DE ${total}`, (pdf.internal.pageSize.getWidth()/2)-10, pdf.internal.pageSize.getHeight()-8);
    }
  }).save().then(() => { 
    printHeader.style.display = 'none'; 
    printTitle.style.color = '#00ffff'; 
    printTime.style.color = '#ffe600';
  });
}

function actualizarFooter(total) {
  const n = new Date();
  document.getElementById('footer').textContent = `// SYNC ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')} · ${total} REGISTROS`;
}

setInterval(() => { if(enPedidos) tick(); }, 1000);
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = `${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}:${n.getSeconds().toString().padStart(2,'0')}`;
  document.getElementById('date').textContent = `${n.getDate().toString().padStart(2,'0')}/${(n.getMonth()+1).toString().padStart(2,'0')}/${n.getFullYear().toString().slice(-2)}`;
}
cargarTodo();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos Live</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #060a12;
    font-family: 'Share Tech Mono', monospace;
    color: #c8e8ff;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, #0ff1 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, #0ff4, #0ff, #0ff4, transparent);
    animation: scanline 4s linear infinite;
    z-index: 1; pointer-events: none;
  }
  @keyframes scanline {
    0%   { top: -2px; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { top: 100vh; opacity: 0; }
  }
  .container {
    position: relative; z-index: 2;
    padding: 16px 12px 24px;
    max-width: 480px; margin: 0 auto;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px; padding-bottom: 10px;
    border-bottom: 1px solid #0ff2;
  }
  .header-title { font-size: 12px; color: #0ff9; letter-spacing: 0.15em; }
  .live-badge {
    display: flex; align-items: center; gap: 7px;
    font-size: 10px; color: #0f0; letter-spacing: 0.12em;
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #0f0;
    box-shadow: 0 0 0 0 #0f06;
    animation: pulse 1.5s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 #0f06; }
    70%  { box-shadow: 0 0 0 8px #0f000; }
    100% { box-shadow: 0 0 0 0 #0f000; }
  }
  .clock { font-size: 10px; color: #446688; letter-spacing: 0.1em; }
  .card {
    background: #0a0f1c; border: 1px solid #0ff2;
    border-radius: 4px; margin-bottom: 10px;
    position: relative; overflow: hidden;
    animation: fadeIn 0.4s ease both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
  }
  .card.PENDIENTE::before  { background: #ff3344; }
  .card.EN-PROCESO::before { background: #ff9500; }
  .card.TERMINADO::before  { background: #ffe600; }
  .card.DESPACHADO::before { background: #00cfff; }
  .card.RECIBIDO::before   { background: #00e64d; }
  .c { position: absolute; width: 8px; height: 8px; }
  .tl { top:0;left:0; border-top:1px solid #0ff5; border-left:1px solid #0ff5; }
  .tr { top:0;right:0; border-top:1px solid #0ff5; border-right:1px solid #0ff5; }
  .bl { bottom:0;left:0; border-bottom:1px solid #0ff5; border-left:1px solid #0ff5; }
  .br { bottom:0;right:0; border-bottom:1px solid #0ff5; border-right:1px solid #0ff5; }
  .card-inner { padding: 10px 12px 10px 15px; }
  .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .card-product { font-size:11px; color:#d8f0ff; letter-spacing:0.04em; line-height:1.3; flex:1; min-width:0; }
  .card-qty {
    font-size:9px; color:#0ff; letter-spacing:0.08em;
    background:#0ff1; border:1px solid #0ff3;
    padding:2px 7px; border-radius:2px; flex-shrink:0; white-space:nowrap;
  }
  .card-client { font-size:10px; color:#446688; margin-top:3px; letter-spacing:0.05em; }
  .card-mid { display:flex; align-items:center; margin-top:10px; gap:10px; }
  .bar-wrap { flex:1; }
  .bar-track { height:4px; background:#111c2a; border-radius:2px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:2px; animation: barGrow 1s cubic-bezier(.4,0,.2,1) both; }
  @keyframes barGrow { from { width: 0 !important; } }
  .bar-labels { display:flex; justify-content:space-between; margin-top:5px; }
  .bar-label { font-size:7px; letter-spacing:0.06em; color:#334455; }
  .bar-label.active { color: inherit; }
  .demora-box { text-align:right; flex-shrink:0; min-width:48px; }
  .demora-num { font-size:22px; line-height:1; }
  .demora-unit { font-size:8px; color:#446688; letter-spacing:0.1em; }
  .card-bottom { margin-top:7px; display:flex; align-items:center; justify-content:space-between; }
  .estado-pill {
    font-size:8px; letter-spacing:0.12em;
    padding:2px 8px; border-radius:2px; border:1px solid;
  }
  .pill-PENDIENTE  { color:#ff3344; border-color:#ff33442a; background:#ff33440d; }
  .pill-EN-PROCESO { color:#ff9500; border-color:#ff95002a; background:#ff95000d; }
  .pill-TERMINADO  { color:#ffe600; border-color:#ffe6002a; background:#ffe6000d; }
  .pill-DESPACHADO { color:#00cfff; border-color:#00cfff2a; background:#00cfff0d; }
  .pill-RECIBIDO   { color:#00e64d; border-color:#00e64d2a; background:#00e64d0d; }
  .fecha-small { font-size:8px; color:#334455; letter-spacing:0.06em; }
  .loading {
    text-align:center; color:#0ff6; font-size:12px;
    letter-spacing:0.15em; padding:40px 0;
    animation: blink2 1s infinite;
  }
  @keyframes blink2 { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .error { text-align:center; color:#ff3344; font-size:11px; padding:30px 12px; letter-spacing:0.08em; line-height:1.8; }
  .footer { text-align:center; font-size:9px; color:#223344; letter-spacing:0.1em; margin-top:8px; }
  .refresh-btn {
    display:block; margin:12px auto 0; background:transparent;
    border:1px solid #0ff3; color:#0ff8; font-family:'Share Tech Mono',monospace;
    font-size:10px; letter-spacing:0.12em; padding:6px 16px;
    border-radius:2px; cursor:pointer;
  }
  .refresh-btn:active { background:#0ff1; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="header-title">// LUXURY · PEDIDOS</span>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </div>
  <div id="cards"><div class="loading">CARGANDO DATOS...</div></div>
  <button class="refresh-btn" onclick="cargarTodo()">↺ ACTUALIZAR</button>
  <div class="footer" id="footer"></div>
</div>

<script>
const SHEET_ID = '1Zd4OApS21VwEA29jHzbAM0P_Q8T6BOaChgj9q5EhNWo';

function sheetURL(nombre) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(nombre)}&t=${Date.now()}`;
}

async function fetchSheet(nombre) {
  const res = await fetch(sheetURL(nombre));
  const txt = await res.text();
  const json = JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json.table.rows;
}

function parseGoogleDate(v) {
  if (!v) return null;
  if (typeof v === 'string' && v.startsWith('Date(')) {
    const parts = v.replace('Date(','').replace(')','').split(',');
    return new Date(+parts[0], +parts[1], +parts[2]);
  }
  return null;
}

function diasDesde(fecha) {
  if (!fecha) return '—';
  const hoy = new Date();
  hoy.setHours(0,0,0,0);
  const diff = Math.floor((hoy - fecha) / (1000*60*60*24));
  return diff >= 0 ? diff : 0;
}

function formatFecha(fecha) {
  if (!fecha) return '';
  return `${fecha.getDate()}/${fecha.getMonth()+1}/${fecha.getFullYear()}`;
}

const ESTADOS = ['PENDIENTE','EN PROCESO','TERMINADO','DESPACHADO','RECIBIDO'];
const COLORES = {
  'PENDIENTE':  '#ff3344',
  'EN PROCESO': '#ff9500',
  'TERMINADO':  '#ffe600',
  'DESPACHADO': '#00cfff',
  'RECIBIDO':   '#00e64d',
};
const BAR_PCT = { 'PENDIENTE':8, 'EN PROCESO':33, 'TERMINADO':58, 'DESPACHADO':80, 'RECIBIDO':100 };

function numColor(dias) {
  if (dias === '—') return '#446688';
  if (dias > 60) return '#ff3344';
  if (dias > 20) return '#ff9500';
  return '#00e64d';
}

function estadoKey(e) { return (e||'').trim().toUpperCase(); }
function cssKey(e) { return estadoKey(e).replace(/ /g,'-'); }

async function cargarTodo() {
  document.getElementById('cards').innerHTML = '<div class="loading">CARGANDO DATOS...</div>';
  try {
    const [rowsPedidos, rowsPrecios, rowsClientes] = await Promise.all([
      fetchSheet('PEDIDOS'),
      fetchSheet('PRECIOS DE LISTA'),
      fetchSheet('CLIENTES'),
    ]);

    const productos = {};
    rowsPrecios.forEach(r => {
      const id     = r.c[0]?.v;
      const nombre = r.c[1]?.v;
      if (id != null && nombre) productos[String(id)] = nombre;
    });

    const clientes = {};
    rowsClientes.forEach(r => {
      const id     = r.c[0]?.v;
      const nombre = r.c[1]?.v;
      if (id && nombre) clientes[String(id)] = nombre;
    });

    if (!rowsPedidos || rowsPedidos.length === 0) {
      document.getElementById('cards').innerHTML = '<div class="error">// SIN PEDIDOS REGISTRADOS</div>';
      return;
    }

    let html = '';
    rowsPedidos.forEach((row, i) => {
      const cols      = row.c;
      const fechaRaw  = cols[1]?.v || null;
      const clienteId = String(cols[2]?.v || '');
      const prodId    = String(cols[3]?.v || '');
      const cantidad  = cols[4]?.v || '—';
      const nota      = cols[5]?.v || '';
      const estadoRaw = estadoKey(cols[6]?.v || 'PENDIENTE');

      const fechaObj   = parseGoogleDate(fechaRaw);
      const dias       = diasDesde(fechaObj);
      const fechaStr   = formatFecha(fechaObj);
      const nombreProd = productos[prodId] || prodId;
      const nombreCli  = clientes[clienteId] || clienteId;
      const ck         = cssKey(estadoRaw);
      const color      = COLORES[estadoRaw] || '#ff3344';
      const pct        = BAR_PCT[estadoRaw] || 8;
      const nc         = numColor(dias);

      const etiquetas = ESTADOS.map(e => {
        const isActive = estadoKey(e) === estadoRaw;
        const col = isActive ? `color:${color}` : '';
        return `<span class="bar-label${isActive?' active':''}" style="${col}">${e.replace(' ','&nbsp;')}</span>`;
      }).join('');

      html += `
      <div class="card ${ck}" style="animation-delay:${i*0.08}s">
        <div class="c tl"></div><div class="c tr"></div>
        <div class="c bl"></div><div class="c br"></div>
        <div class="card-inner">
          <div class="card-top">
            <div class="card-product">${nombreProd}</div>
            <div class="card-qty">${cantidad} ud.</div>
          </div>
          <div class="card-client">&gt; ${nombreCli}${nota ? ' · ' + nota : ''}</div>
          <div class="card-mid">
            <div class="bar-wrap">
              <div class="bar-track">
                <div class="bar-fill" style="width:${pct}%;background:${color};"></div>
              </div>
              <div class="bar-labels">${etiquetas}</div>
            </div>
            <div class="demora-box">
              <div class="demora-num" style="color:${nc}">${dias}</div>
              <div class="demora-unit">DÍAS</div>
            </div>
          </div>
          <div class="card-bottom">
            <span class="estado-pill pill-${ck}">${estadoRaw}</span>
            <span class="fecha-small">${fechaStr}</span>
          </div>
        </div>
      </div>`;
    });

    document.getElementById('cards').innerHTML = html;
    const now = new Date();
    document.getElementById('footer').textContent =
      `// SYNC ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')} · ${rowsPedidos.length} REGISTROS`;

  } catch(e) {
    document.getElementById('cards').innerHTML =
      `<div class="error">// ERROR AL CARGAR DATOS<br>Verificá que las 3 hojas sean públicas<br><small style="color:#446688">${e.message}</small></div>`;
  }
}

function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}

tick();
setInterval(tick, 1000);
setInterval(cargarTodo, 60000);
cargarTodo();
</script>
</body>
</html>

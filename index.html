<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos Live</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #060a12;
    font-family: 'Share Tech Mono', monospace;
    color: #c8e8ff;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, #0ff1 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none; z-index: 0;
  }
  .container {
    position: relative; z-index: 2;
    padding: 16px 12px 24px;
    max-width: 480px; margin: 0 auto;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px; padding-bottom: 10px;
    border-bottom: 1px solid #0ff2;
  }
  .logo-img {
    height: 56px; width: auto; display: block;
    object-fit: contain;
    border-radius: 4px;
  }
  .live-badge {
    display: flex; align-items: center; gap: 7px;
    font-size: 11px; color: #0f0; letter-spacing: 0.15em; font-weight: bold;
  }
  .live-dot {
    width: 9px; height: 9px; border-radius: 50%; background: #0f0;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%   { opacity: 1; box-shadow: 0 0 0 0 #0f08; }
    45%  { opacity: 1; box-shadow: 0 0 0 6px #0f000; }
    50%  { opacity: 0; box-shadow: 0 0 0 0 #0f000; }
    55%  { opacity: 0; }
    100% { opacity: 1; box-shadow: 0 0 0 0 #0f08; }
  }
  .clock { font-size: 13px; color: #7ecfff; letter-spacing: 0.12em; }
  .card {
    background: #0a0f1c; border: 1px solid #0ff2;
    border-radius: 4px; margin-bottom: 10px;
    position: relative; overflow: visible;
    animation: fadeIn 0.4s ease both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
  }
  .card.PENDIENTE::before  { background: #ff3344; }
  .card.EN-PROCESO::before { background: #ff9500; }
  .card.TERMINADO::before  { background: #ffe600; }
  .card.DESPACHADO::before { background: #00cfff; }
  .card.RECIBIDO::before   { background: #00e64d; }
  .c { position: absolute; width: 8px; height: 8px; }
  .tl { top:0;left:0; border-top:1px solid #0ff5; border-left:1px solid #0ff5; }
  .tr { top:0;right:0; border-top:1px solid #0ff5; border-right:1px solid #0ff5; }
  .bl { bottom:0;left:0; border-bottom:1px solid #0ff5; border-left:1px solid #0ff5; }
  .br { bottom:0;right:0; border-bottom:1px solid #0ff5; border-right:1px solid #0ff5; }
  .card-inner { padding: 12px 14px 12px 17px; }
  .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .card-product { font-size:13px; color:#d8f0ff; letter-spacing:0.04em; line-height:1.3; flex:1; min-width:0; }
  .card-qty {
    font-size:11px; color:#0ff; letter-spacing:0.08em;
    background:#0ff1; border:1px solid #0ff3;
    padding:3px 9px; border-radius:2px; flex-shrink:0; white-space:nowrap;
  }
  .card-client { font-size:12px; color:#5588aa; margin-top:4px; letter-spacing:0.05em; }
  .card-mid { display:flex; align-items:center; margin-top:12px; gap:12px; }
  .bar-wrap { flex:1; min-width:0; }
  .bar-track { height:6px; background:#111c2a; border-radius:2px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:2px; animation: barGrow 1s cubic-bezier(.4,0,.2,1) both; }
  @keyframes barGrow { from { width: 0 !important; } }
  .bar-state-row {
    position: relative;
    height: 26px;
    margin-top: 6px;
    overflow: visible;
  }
  .estado-tag {
    position: absolute;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.10em;
    padding: 3px 7px;
    border-radius: 2px;
    border: 1px solid;
    white-space: nowrap;
    top: 0;
    transform: translateX(-100%);
    line-height: 1.5;
    font-family: 'Share Tech Mono', monospace;
  }
  .demora-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 50px;
    gap: 0;
  }
  .demora-num { font-size: 26px; line-height: 1; font-weight: bold; }
  .demora-unit { font-size: 9px; color: #446688; letter-spacing: 0.1em; }
  .loading {
    text-align:center; color:#0ff6; font-size:13px;
    letter-spacing:0.15em; padding:40px 0;
    animation: blink2 1s infinite;
  }
  @keyframes blink2 { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .error { text-align:center; color:#ff3344; font-size:12px; padding:30px 12px; letter-spacing:0.08em; line-height:1.8; }
  .footer {
    text-align:center; font-size:13px; color:#7ecfff;
    letter-spacing:0.12em; margin-top:10px;
  }
  .refresh-btn {
    display:block; margin:12px auto 0; background:transparent;
    border:1px solid #0ff3; color:#0ff8; font-family:'Share Tech Mono',monospace;
    font-size:11px; letter-spacing:0.12em; padding:7px 18px;
    border-radius:2px; cursor:pointer;
  }
  .refresh-btn:active { background:#0ff1; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <img class="logo-img" id="logoImg" alt="Luxury High Density" />
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
      <div class="live-badge"><div class="live-dot"></div>EN VIVO</div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </div>
  <div id="cards"><div class="loading">CARGANDO DATOS...</div></div>
  <button class="refresh-btn" onclick="cargarTodo()">↺ ACTUALIZAR</button>
  <div class="footer" id="footer"></div>
</div>

const SHEET_ID = '1Zd4OApS21VwEA29jHzbAM0P_Q8T6BOaChgj9q5EhNWo';

function sheetURL(nombre) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(nombre)}&t=${Date.now()}`;
}

async function fetchSheet(nombre) {
  const res = await fetch(sheetURL(nombre));
  const txt = await res.text();
  const json = JSON.parse(txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return json.table.rows;
}

function parseGoogleDate(v) {
  if (!v) return null;
  if (typeof v === 'string' && v.startsWith('Date(')) {
    const parts = v.replace('Date(','').replace(')','').split(',');
    return new Date(+parts[0], +parts[1], +parts[2]);
  }
  return null;
}

const COLORES = {
  'PENDIENTE':  '#ff3344',
  'EN PROCESO': '#ff9500',
  'TERMINADO':  '#ffe600',
  'DESPACHADO': '#00cfff',
  'RECIBIDO':   '#00e64d',
};

const BAR_PCT = { 'PENDIENTE':28, 'EN PROCESO':50, 'TERMINADO':65, 'DESPACHADO':80, 'RECIBIDO':100 };

const TAG_BG = {
  'PENDIENTE':  'rgba(255,51,68,0.12)',
  'EN PROCESO': 'rgba(255,149,0,0.12)',
  'TERMINADO':  'rgba(255,230,0,0.12)',
  'DESPACHADO': 'rgba(0,207,255,0.12)',
  'RECIBIDO':   'rgba(0,230,77,0.12)',
};

const UMBRAL_DIAS = 7;

function estadoKey(e) { return (e||'').trim().toUpperCase(); }
function cssKey(e) { return estadoKey(e).replace(/ /g,'-'); }

async function cargarTodo() {
  document.getElementById('cards').innerHTML = '<div class="loading">CARGANDO DATOS...</div>';
  try {
    const [rowsPedidos, rowsPrecios, rowsClientes] = await Promise.all([
      fetchSheet('PEDIDOS'),
      fetchSheet('PRECIOS DE LISTA'),
      fetchSheet('CLIENTES'),
    ]);

    const productos = {};
    rowsPrecios.forEach(r => {
      const id = r.c[0]?.v; const nombre = r.c[1]?.v;
      if (id != null && nombre) productos[String(id)] = nombre;
    });

    const clientes = {};
    rowsClientes.forEach(r => {
      const id = r.c[0]?.v; const nombre = r.c[1]?.v;
      if (id && nombre) clientes[String(id)] = nombre;
    });

    if (!rowsPedidos || rowsPedidos.length === 0) {
      document.getElementById('cards').innerHTML = '<div class="error">// SIN PEDIDOS REGISTRADOS</div>';
      return;
    }

    let html = '';
    rowsPedidos.forEach((row, i) => {
      const cols           = row.c;
      const fechaRaw       = cols[1]?.v || null;
      const clienteId      = String(cols[2]?.v || '');
      const prodId         = String(cols[3]?.v || '');
      const cantidad       = cols[4]?.v || '—';
      const estadoRaw      = estadoKey(cols[6]?.v || 'PENDIENTE');
      const fechaCierreRaw = cols[7]?.v || null;

      const fechaObj    = parseGoogleDate(fechaRaw);
      const fechaCierre = parseGoogleDate(fechaCierreRaw);

      let dias;
      if (estadoRaw === 'RECIBIDO') {
        if (fechaCierre && fechaObj) {
          const diff = Math.floor((fechaCierre - fechaObj) / (1000*60*60*24));
          dias = diff >= 0 ? diff : 0;
        } else if (fechaObj) {
          const hoy = new Date(); hoy.setHours(0,0,0,0);
          dias = Math.floor((hoy - fechaObj) / (1000*60*60*24));
          if (dias < 0) dias = 0;
        } else { dias = null; }
      } else {
        if (fechaObj) {
          const hoy = new Date(); hoy.setHours(0,0,0,0);
          dias = Math.floor((hoy - fechaObj) / (1000*60*60*24));
          if (dias < 0) dias = 0;
        } else { dias = null; }
      }

      const nombreProd = productos[prodId] || prodId;
      const nombreCli  = clientes[clienteId] || clienteId;
      const ck         = cssKey(estadoRaw);
      const color      = COLORES[estadoRaw] || '#ff3344';
      const pct        = BAR_PCT[estadoRaw] || 28;
      const tagBg      = TAG_BG[estadoRaw] || 'rgba(255,51,68,0.12)';
      const estadoLabel = estadoRaw.replace('EN PROCESO', 'EN&nbsp;PROCESO');

      const diasNum    = (dias !== null) ? dias : '—';
      const demasiado  = (dias !== null && dias > UMBRAL_DIAS);
      const colorDias  = demasiado ? '#ff3344' : '#ffffff';

      const clockSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${colorDias}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 15.5 14.5"/></svg>`;

      html += `
      <div class="card ${ck}" style="animation-delay:${i*0.08}s">
        <div class="c tl"></div><div class="c tr"></div>
        <div class="c bl"></div><div class="c br"></div>
        <div class="card-inner">
          <div class="card-top">
            <div class="card-product">${nombreProd}</div>
            <div class="card-qty">${cantidad} ud.</div>
          </div>
          <div class="card-client">&gt; ${nombreCli}</div>
          <div class="card-mid">
            <div class="bar-wrap">
              <div class="bar-track">
                <div class="bar-fill" style="width:${pct}%;background:${color};"></div>
              </div>
              <div class="bar-state-row">
                <div class="estado-tag" style="left:${pct}%;color:${color};border-color:${color};background:${tagBg};">${estadoLabel}</div>
              </div>
            </div>
            <div class="demora-box">
              ${clockSVG}
              <div class="demora-num" style="color:${colorDias};">${diasNum}</div>
              <div class="demora-unit">DÍAS</div>
            </div>
          </div>
        </div>
      </div>`;
    });

    document.getElementById('cards').innerHTML = html;
    const now = new Date();
    document.getElementById('footer').textContent =
      `// SYNC ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')} · ${rowsPedidos.length} REGISTROS`;

  } catch(e) {
    document.getElementById('cards').innerHTML =
      `<div class="error">// ERROR AL CARGAR DATOS<br>Verificá que las 3 hojas sean públicas<br><small style="color:#446688">${e.message}</small></div>`;
  }
}

function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}

tick();
setInterval(tick, 1000);
setInterval(cargarTodo, 60000);
cargarTodo();
</script>
</body>
</html>
